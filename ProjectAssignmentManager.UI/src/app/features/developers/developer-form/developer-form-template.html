<div class="container">
  <div class="card">
    <h2>{{ isEditMode ? 'Edit Developer' : 'Create Developer' }}</h2>
    
    <div *ngIf="loading" class="loading">Loading...</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <form [formGroup]="developerForm" (ngSubmit)="onSubmit()" *ngIf="!loading">
      <div class="form-group">
        <label for="name">Name *</label>
        <input
          id="name"
          type="text"
          class="form-control"
          formControlName="name"
          placeholder="Enter developer name"
        />
        <div *ngIf="developerForm.get('name')?.invalid && developerForm.get('name')?.touched" class="error-message">
          <small *ngIf="developerForm.get('name')?.errors?.['required']">Name is required</small>
          <small *ngIf="developerForm.get('name')?.errors?.['minlength']">Name must be at least 2 characters</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input
          id="email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter email address"
        />
        <div *ngIf="developerForm.get('email')?.invalid && developerForm.get('email')?.touched" class="error-message">
          <small *ngIf="developerForm.get('email')?.errors?.['required']">Email is required</small>
          <small *ngIf="developerForm.get('email')?.errors?.['email']">Invalid email format</small>
        </div>
      </div>

      <div class="form-group">
        <label for="seniorityLevel">Seniority Level *</label>
        <select id="seniorityLevel" class="form-control" formControlName="seniorityLevel">
          <option *ngFor="let level of seniorityLevels" [value]="level.value">
            {{ level.label }}
          </option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="developerForm.invalid || loading">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
